name: Attach Publish workflow to PR

on:
  workflow_run:
    workflows: ["Publish PR Dynamic Plugins as Images"]
    types: [requested, completed]

permissions:
    pull-requests: read
    checks: write

jobs:
  create-commit-status:
    runs-on: ubuntu-latest
    steps:
      - name: Create Commit Status 
        uses: actions/github-script@v7
        with:
          script: |
            console.log(context.payload.workflow_run);

            branchPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_sha}`
            });
            if (branchPRs.length === 0) {
              return;
            }
            console.log(branchPRs);

            const response = await github.rest.satuses.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: context.payload.workflow_run.name,
              sha: branchPRs[0].commit.sha,
              status: context.payload.workflow_run.status !== 'completed' ?
                'pending'
                : context.payload.workflow_run.conclusion !== 'success' ?
                  'failure'
                  : 'success',
              target_url: context.payload.workflow_run.html_url
            });
