name: Update plugins repository references
on:
  workflow_dispatch:
    inputs:
      regexps:
        type: string
        required: false
        default: ""        
      verbose:
        type: boolean
        required: false
        default: false        
      debug:
        type: boolean
        required: false
        default: false
      util-repo:
        type: string
        required: false
        default: davidfestal/rhdh-plugin-export-utils
      util-repo-ref:
        type: string
        required: false
        default: multi-plugins-repo
  
#  schedule:
#    - cron: '0 12 * * *'    

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    name: Prepare 
    outputs:
      regexps: ${{ steps.read-regexps.outputs.regexps }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Read Regexps
        id: read-regexps
        shell: bash
        run: |
            regexps="${{ inputs.regexps }}"
            if [["${regexps}" == "" ]]
            then
              regexps="$(cat plugins-regexps)"
            fi
            echo "Regexps of plugins to export:"
            echo "$regexps"
            echo "regexps=$(echo $regexps | tr '\n' ' ')" >> $GITHUB_OUTPUT

  update:
    name: Update
    needs: prepare
    uses: ${{ inputs.utils-repo }}/.github/workflows/update-plugins-repo-refs.yaml@{{ utils-repo-ref }}
    with:
      regexps: ${{ needs.prepare.outputs.regexps }}
      overlay-repo: ${{ github.repository }}      
      release-branch-prefix: release-
      verbose: ${{ inputs.verbose }}
      debug: ${{ inputs.debug }}

