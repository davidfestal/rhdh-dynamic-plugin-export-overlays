name: Update plugins repository references
on:
  workflow_dispatch:
  
#  schedule:
#    - cron: '0 12 * * *'    

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    name: Prepare 
    outputs:
      regexps: ${{ steps.read-regexps.outputs.regexps }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Read Regexps
        id: read-regexps
        shell: bash
        run: |
            regexps="$(cat plugins-regexps)"
            echo "Regexps of plugins to export:"
            echo "$regexps"
  
            echo "regexps=\"$regexps\"" >> $GITHUB_OUTPUT

  update:
    name: Update
    needs: prepare
    uses: davidfestal/rhdh-plugin-export-utils/.github/workflows/update-plugins-repo-refs.yaml@multi-plugins-repo
    with:
      regexps: ${{ needs.prepare.outputs.regexps }}
      overlay-repo: ${{ github.repository }}      
      release-branch-prefix: release-

